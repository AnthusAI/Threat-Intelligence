name: Inbound email tests

on:
  push:
    branches: [main]
    paths:
      - "src/papyrus_newsroom/email_submissions.py"
      - "src/papyrus_newsroom/email_submission_replies.py"
      - "src/papyrus_newsroom/email_submission_feedback.py"
      - "src/papyrus_content/reference_metadata_generation.py"
      - "src/papyrus_content/graphql_authoring.py"
      - "procedures/newsroom/tests/test_email_submissions.py"
      - "procedures/newsroom/tests/test_email_submission_feedback.py"
      - "procedures/newsroom/tests/test_email_submission_replies.py"
      - "amplify/functions/**/email*"
      - "amplify/functions/**/ses-inbound*"
      - "amplify/backend.ts"
      - "amplify/storage/resource.ts"
      - ".github/workflows/inbound-email-tests.yml"
  pull_request:
    paths:
      - "src/papyrus_newsroom/email_submissions.py"
      - "src/papyrus_newsroom/email_submission_replies.py"
      - "src/papyrus_newsroom/email_submission_feedback.py"
      - "src/papyrus_content/reference_metadata_generation.py"
      - "src/papyrus_content/graphql_authoring.py"
      - "procedures/newsroom/tests/test_email_submissions.py"
      - "procedures/newsroom/tests/test_email_submission_feedback.py"
      - "procedures/newsroom/tests/test_email_submission_replies.py"
      - "amplify/functions/**/email*"
      - "amplify/functions/**/ses-inbound*"
      - "amplify/backend.ts"
      - "amplify/storage/resource.ts"
      - ".github/workflows/inbound-email-tests.yml"

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Email submission unit tests
        run: |
          poetry run python -m unittest \
            procedures.newsroom.tests.test_email_submissions \
            procedures.newsroom.tests.test_email_submission_feedback \
            procedures.newsroom.tests.test_email_submission_replies \
            -v
