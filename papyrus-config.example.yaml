# Copy to .papyrus/config.yaml (that path is gitignored) and adjust for your deployment.
schemaVersion: 1

topics:
  steeringConfigPath: corpora/papyrus-steering.yml
  lexicalConfigPath: corpora/papyrus-lexical-steering.yml

# Public web UI used in outbound emails (submission feedback links to references).
# Override in Lambda with PAPYRUS_PUBLIC_SITE_BASE_URL when config file is absent.
publicSite:
  baseUrl: https://p.apyr.us

# OpenAI credentials/defaults for the video pipeline (VideoML TTS).
# Set api_key in .papyrus/config.yaml (gitignored), not in this example file.
# OPENAI_API_KEY env var overrides api_key when both are set.
openai:
  api_key: ""
  model: gpt-4o-mini-tts
  voice: alloy
